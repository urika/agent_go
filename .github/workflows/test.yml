name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pytest pytest-mock

      - name: Run tests
        run: |
          pytest tests/ -q

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check agent_go/ --select=E,F --ignore=E501 || true
