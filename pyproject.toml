[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
# E: pycodestyle  F: Pyflakes (含 F401 unused-import)  W: pycodestyle warnings
select = ["E", "F", "W"]
ignore = ["E501"]  # 行长度由 formatter 管理

[tool.mypy]
python_version = "3.9"
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
